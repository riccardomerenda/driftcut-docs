site_name: Driftcut Docs
site_url: https://docs.driftcut.dev
site_description: Documentation for Driftcut, a v0.11.1 alpha CLI for LLM migration canaries with project scaffolding, corpus bootstrap, run comparison, live runs, replay mode, deterministic checks, richer failure archetypes, category scorecards, optional Redis memory, tiered judge escalation, and STOP/CONTINUE/PROCEED decisions.
repo_url: https://github.com/riccardomerenda/driftcut
repo_name: riccardomerenda/driftcut
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: slate
      primary: red
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Outfit
    code: IBM Plex Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - CLI Reference: cli-reference.md
  - Concept: concept.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/riccardomerenda/driftcut
